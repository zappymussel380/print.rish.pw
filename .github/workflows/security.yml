name: Security and verification

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_ORIGIN: https://example.invalid
  DATABASE_URL: postgresql://print_web:ci-runtime-password-00000000000000000000@localhost:5432/print
  REDIS_URL: redis://:ci-redis-password-000000000000000000000@localhost:6379
  SESSION_SECRET: ci-session-secret-000000000000000000000000000000000000000000000000
  ADMIN_PASSWORD_HASH: $2b$12$LQv3c1yqBWXv6LoYh5pCjOaFh5SwmP7j8WbWm5CDhP5Rw1G2uQ0eW

jobs:
  repository-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan dependencies, configuration, and secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://print_web:ci-web-password-00000000000000000000000000@127.0.0.1:5432/print_integration
      REDIS_URL: redis://:ci-redis-password-000000000000000000000@127.0.0.1:6379
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: print_owner
          POSTGRES_PASSWORD: ci-owner-password-000000000000000000000000
          POSTGRES_DB: print_integration
        ports:
          - "127.0.0.1:5432:5432"
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U print_owner -d print_integration"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        env:
          REDISCLI_AUTH: ci-redis-password-000000000000000000000
        command: redis-server --requirepass ci-redis-password-000000000000000000000
        ports:
          - "127.0.0.1:6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify proxy trust guard
        shell: bash
        run: |
          set -euo pipefail
          valid=(
            "192.0.2.10"
            "192.0.2.10/32"
            "2001:db8::10"
            "2001:db8::10/128"
            "::ffff:192.0.2.10/128"
          )
          invalid=(
            ""
            "192.0.2.0/24"
            "2001:db8::/64"
            "999.0.0.1"
            "proxy.internal"
            "192.0.2.10;include bad.conf"
            $'192.0.2.10\nset_real_ip_from 0.0.0.0/0;'
          )
          for value in "${valid[@]}"; do
            TRUSTED_PROXY_CIDR="$value" docker/proxy/05-validate-trusted-proxy.sh >/dev/null
          done
          for value in "${invalid[@]}"; do
            if TRUSTED_PROXY_CIDR="$value" docker/proxy/05-validate-trusted-proxy.sh >/dev/null 2>&1; then
              echo "Proxy validator accepted an unsafe value" >&2
              exit 1
            fi
          done

          docker run --rm --add-host web:127.0.0.1 \
            -e TRUSTED_PROXY_CIDR=192.0.2.10/32 \
            -v "$PWD/docker/proxy/05-validate-trusted-proxy.sh:/docker-entrypoint.d/05-validate-trusted-proxy.sh:ro" \
            -v "$PWD/docker/proxy/nginx.conf:/etc/nginx/templates/default.conf.template:ro" \
            nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa nginx -t

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.12.0 --activate

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify PostgreSQL client
        run: psql --version

      - name: Generate Prisma client
        run: pnpm --filter @print/db generate

      - name: Deploy integration database schema
        env:
          DATABASE_URL: postgresql://print_owner:ci-owner-password-000000000000000000000000@127.0.0.1:5432/print_integration
        run: pnpm --filter @print/db migrate:deploy

      - name: Provision integration database roles
        env:
          MIGRATION_DATABASE_URL: postgresql://print_owner:ci-owner-password-000000000000000000000000@127.0.0.1:5432/print_integration
          WEB_DATABASE_URL: postgresql://print_web:ci-web-password-00000000000000000000000000@127.0.0.1:5432/print_integration
          WORKER_DATABASE_URL: postgresql://print_worker:ci-worker-password-0000000000000000000000@127.0.0.1:5432/print_integration
        run: node apps/web/scripts/provision-database.mjs

      - name: Audit dependencies
        run: pnpm audit --audit-level low

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Integration test
        env:
          MIGRATION_DATABASE_URL: postgresql://print_owner:ci-owner-password-000000000000000000000000@127.0.0.1:5432/print_integration
          WORKER_DATABASE_URL: postgresql://print_worker:ci-worker-password-0000000000000000000000@127.0.0.1:5432/print_integration
        run: pnpm --filter @print/web test:integration

      - name: Full HTTP quotation flow
        shell: bash
        env:
          APP_ORIGIN: http://127.0.0.1:3000
          REDIS_URL: redis://:ci-redis-password-000000000000000000000@127.0.0.1:6379/1
          WORKER_DATABASE_URL: postgresql://print_worker:ci-worker-password-0000000000000000000000@127.0.0.1:5432/print_integration
          STORAGE_RESERVE_MB: "1"
          MAX_UPLOAD_MB: "10"
          MAX_SESSION_UPLOAD_MB: "20"
          UPLOAD_WINDOW_MB: "20"
          WORKER_CONCURRENCY: "1"
        run: |
          set -euo pipefail
          flow_root="$(mktemp -d)"
          web_log="$flow_root/web.log"
          worker_log="$flow_root/worker.log"
          web_pid=""
          worker_pid=""

          cleanup() {
            status=$?
            trap - EXIT
            for pid in "$web_pid" "$worker_pid"; do
              if [[ -n "$pid" ]]; then kill -TERM -- "-$pid" 2>/dev/null || true; fi
            done
            for _ in {1..50}; do
              alive=0
              for pid in "$web_pid" "$worker_pid"; do
                if [[ -n "$pid" ]] && kill -0 -- "-$pid" 2>/dev/null; then alive=1; fi
              done
              if (( alive == 0 )); then break; fi
              sleep 0.1
            done
            for pid in "$web_pid" "$worker_pid"; do
              if [[ -n "$pid" ]]; then kill -KILL -- "-$pid" 2>/dev/null || true; fi
            done
            for pid in "$web_pid" "$worker_pid"; do
              if [[ -n "$pid" ]]; then wait "$pid" 2>/dev/null || true; fi
            done
            if (( status != 0 )); then
              tail -n 200 "$web_log" "$worker_log" >&2 || true
            fi
            rm -rf "$flow_root"
            exit "$status"
          }
          trap cleanup EXIT

          export UPLOAD_DIR="$flow_root/uploads"
          export PDF_DIR="$flow_root/pdfs"
          export SLICE_WORK_DIR="$flow_root/slice-jobs"

          setsid pnpm --filter @print/web dev >"$web_log" 2>&1 &
          web_pid=$!
          setsid env \
            NODE_ENV=test \
            STUB_SLICER=true \
            ORCA_BIN=/definitely-not-installed/orca \
            DATABASE_URL="$WORKER_DATABASE_URL" \
            pnpm --filter @print/worker start >"$worker_log" 2>&1 &
          worker_pid=$!

          STUB_SLICER=true pnpm --filter @print/web test:flow

      - name: Build
        run: pnpm build

  codeql:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: javascript-typescript

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install and build
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
          pnpm install --frozen-lockfile
          pnpm build

      - name: Analyze
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
