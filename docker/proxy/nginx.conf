# Compose proxy config. Mounted into the nginx image as
# /etc/nginx/templates/default.conf.template so ${TRUSTED_PROXY_CIDR} is
# substituted at container start. Nginx runtime variables like $host are left
# alone because they are not defined in the container environment.

upstream web_upstream {
  server web:3000;
}

limit_conn_zone $binary_remote_addr zone=per_client:10m;

# Preserve the public scheme only when it came from the explicitly trusted
# forwarder. Direct/untrusted clients cannot spoof X-Forwarded-Proto.
geo $realip_remote_addr $trusted_forwarder {
  default 0;
  ${TRUSTED_PROXY_CIDR} 1;
}
map "$trusted_forwarder:$http_x_forwarded_proto" $forwarded_proto {
  default $scheme;
  "1:https" https;
  "1:http" http;
}

# Query strings may contain legacy capability tokens or customer search data.
log_format no_args '$remote_addr - $remote_user [$time_local] '
                   '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                   '"-" "$http_user_agent"';

server {
  listen 8080;

  # JSON/form endpoints are tiny. Only the exact upload route receives the
  # large transport allowance below.
  client_max_body_size 64k;
  client_body_timeout 15s;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
  limit_conn per_client 30;
  access_log /dev/stdout no_args;
  error_log /dev/stderr warn;

  # Don't advertise the nginx version.
  server_tokens off;

  # Rate limiting keys off X-Real-IP, so it must always be the true browser
  # client. When the connection comes from the trusted upstream forwarder
  # (VPS nginx or Nginx Proxy Manager), adopt the X-Real-IP it set; any other
  # source has its header ignored and its own address used instead.
  set_real_ip_from ${TRUSTED_PROXY_CIDR};
  real_ip_header X-Real-IP;

  location = /api/uploads {
    # One MiB of multipart framing headroom above the app's 300 MiB hard cap.
    client_max_body_size 301m;
    client_body_timeout 120s;
    proxy_pass http://web_upstream;
    # The application streams multipart data through busboy and enforces its
    # own byte budget. Avoid buffering another 300 MiB copy on nginx's root disk.
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header Connection "";
  }

  location ~ ^/api/models/[0-9a-fA-F-]+/file$ {
    limit_conn per_client 4;
    limit_rate_after 10m;
    limit_rate 20m;
    proxy_pass http://web_upstream;
    proxy_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header Connection "";
  }

  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header Connection "";
  }
}
