# Production stack for print.rish.pw.
# Only the proxy publishes a port; the VPS-host nginx proxies print.rish.pw to
# it over Tailscale. Copy .env.example to .env and fill in secrets first.
#
#   docker compose up -d --build
#
# Pinned so the Compose project (and its `print_*` named volumes) stays stable
# regardless of the folder name the stack is launched from.
name: print

services:
  proxy:
    image: nginx:alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      # Bound to loopback by default so the stack is never reachable from the
      # host's public interfaces. Production sets PROXY_BIND in .env to the
      # host's Tailscale IP so the VPS nginx can reach it over the tailnet —
      # never 0.0.0.0 (see docs/DEPLOYMENT.md).
      - "${PROXY_BIND:-127.0.0.1}:8080:8080"
    volumes:
      - ./docker/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file: .env
    environment:
      UPLOAD_DIR: /data/uploads
      PDF_DIR: /data/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
      - pdfs:/data/pdfs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      UPLOAD_DIR: /data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    healthcheck:
      # The worker refreshes worker:heartbeat (TTL 30s) while alive.
      test: ["CMD-SHELL", "[ \"$(redis-cli -h redis exists worker:heartbeat)\" = \"1\" ]"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  pdfs:
