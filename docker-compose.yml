# Production stack for print.rish.pw.
# Only the proxy publishes a port; the VPS-host nginx proxies print.rish.pw to
# it over Tailscale. Copy .env.example to .env and fill in secrets first.
#
#   docker compose up -d --build
#
# Pinned so the Compose project (and its `print_*` named volumes) stays stable
# regardless of the folder name the stack is launched from.
name: print

services:
  proxy:
    image: nginx:alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      # Bound to loopback by default so the stack is never reachable from the
      # host's public interfaces. Production sets PROXY_BIND in .env to the
      # host's Tailscale IP so the VPS nginx can reach it over the tailnet —
      # never 0.0.0.0 (see docs/DEPLOYMENT.md).
      - "${PROXY_BIND:-127.0.0.1}:8080:8080"
    environment:
      # Only this source may assert the real client IP via X-Real-IP (the
      # forwarder the VPS reaches us through). Default trusts nobody.
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:-127.0.0.1}
    volumes:
      - ./docker/proxy/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file: .env
    environment:
      UPLOAD_DIR: /data/uploads
      PDF_DIR: /data/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
      - pdfs:/data/pdfs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    # Deliberately NOT env_file: the worker spawns OrcaSlicer on untrusted
    # uploads, so its environment carries only what it reads (see
    # apps/worker/src/config.ts) — never SESSION_SECRET, the admin hash, or
    # API keys. A compromised slicer must have nothing to steal.
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      UPLOAD_DIR: /data/uploads
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      SLICE_TIMEOUT_SECONDS: ${SLICE_TIMEOUT_SECONDS:-180}
      THUMB_SIZE: ${THUMB_SIZE:-512}
      UPLOAD_RETENTION_HOURS: ${UPLOAD_RETENTION_HOURS:-48}
      FILE_RETENTION_DAYS: ${FILE_RETENTION_DAYS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    healthcheck:
      # The worker refreshes worker:heartbeat (TTL 30s) while alive.
      test: ["CMD-SHELL", "[ \"$(redis-cli -h redis exists worker:heartbeat)\" = \"1\" ]"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g
    # Belt-and-braces for the untrusted-input process: no setuid escalation,
    # no kernel capabilities (Node + xvfb + Orca need none).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  pdfs:
